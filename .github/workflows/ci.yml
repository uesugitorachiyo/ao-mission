name: ci
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: go test ./... -count=1
      - run: go vet ./...
      - run: go build ./cmd/ao-mission
